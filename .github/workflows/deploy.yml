name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: portfolio-terminal/package-lock.json

      - name: Install dependencies
        working-directory: portfolio-terminal
        run: npm ci

      - name: Build application
        working-directory: portfolio-terminal
        run: npx ng build --base-href /portfolio-terminal/

      - name: Create SPA fallback
        working-directory: portfolio-terminal
        run: cp dist/portfolio-terminal/browser/index.html dist/portfolio-terminal/browser/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: portfolio-terminal/dist/portfolio-terminal/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
